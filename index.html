<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>省份数据地图</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root {
  --bg: #060d1a;
  --panel: rgba(8,16,32,0.95);
  --border: rgba(0,180,255,0.14);
  --accent: #00c8ff;
  --text: #c8dff0;
  --muted: #3d6080;
  --dim: #1a2a3a;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif; overflow:hidden; }
body::after { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(0,150,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,150,255,0.03) 1px,transparent 1px); background-size:44px 44px; pointer-events:none; z-index:0; }
.layout { position:relative; z-index:1; height:100vh; display:flex; flex-direction:column; }
.header { height:52px; flex-shrink:0; display:flex; align-items:center; padding:0 24px; border-bottom:1px solid var(--border); background:rgba(6,13,26,0.98); gap:12px; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent); animation:blink 2.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }
.title { font-size:15px; font-weight:500; letter-spacing:3px; background:linear-gradient(90deg,var(--accent),#e0f4ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header-hint { margin-left:auto; font-size:11px; color:var(--muted); letter-spacing:1.5px; }
.body { flex:1; display:flex; overflow:hidden; }
#map { flex:1; min-width:0; }
.sidebar { width:264px; flex-shrink:0; border-left:1px solid var(--border); background:var(--panel); backdrop-filter:blur(16px); display:flex; flex-direction:column; overflow:hidden; }
.sel-block { padding:20px 20px 0; flex-shrink:0; }
.sel-label { font-size:10px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-bottom:10px; }
.sel-name { font-size:26px; font-weight:700; letter-spacing:2px; color:var(--accent); min-height:36px; }
.sel-region { font-size:11px; color:var(--muted); margin-top:4px; letter-spacing:1px; min-height:18px; }
.jump-btn { display:flex; align-items:center; justify-content:center; gap:8px; margin:16px 20px; padding:11px; border-radius:7px; border:1px solid rgba(0,180,255,0.35); background:linear-gradient(135deg,rgba(0,120,255,.12),rgba(0,60,180,.12)); color:var(--accent); font-size:13px; font-weight:500; letter-spacing:1px; cursor:pointer; text-decoration:none; transition:all .2s; flex-shrink:0; }
.jump-btn:hover { border-color:var(--accent); background:linear-gradient(135deg,rgba(0,180,255,.2),rgba(0,100,220,.2)); box-shadow:0 0 20px rgba(0,200,255,.15); }
.jump-btn.disabled { opacity:.28; cursor:default; pointer-events:none; }
.divider { height:1px; background:var(--border); margin:0 16px 12px; flex-shrink:0; }
.list-header { padding:0 20px 8px; font-size:10px; color:var(--muted); letter-spacing:3px; flex-shrink:0; }
.list-scroll { flex:1; overflow-y:auto; padding:0 10px 20px; }
.list-scroll::-webkit-scrollbar { width:3px; }
.list-scroll::-webkit-scrollbar-track { background:transparent; }
.list-scroll::-webkit-scrollbar-thumb { background:var(--dim); border-radius:2px; }
.rg-title { padding:10px 10px 5px; font-size:10px; color:var(--muted); letter-spacing:2px; border-bottom:1px solid var(--border); margin-bottom:2px; }
.prov-row { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:5px; cursor:pointer; transition:background .15s; }
.prov-row:hover { background:rgba(0,180,255,.07); }
.prov-row.sel { background:rgba(0,180,255,.13); }
.prow-pip { width:5px; height:5px; border-radius:50%; flex-shrink:0; transition:box-shadow .15s; }
.prov-row.sel .prow-pip { box-shadow:0 0 6px currentColor; }
.prow-name { font-size:13px; color:var(--text); flex:1; }
.prow-arr { font-size:12px; color:var(--muted); transition:all .15s; }
.prov-row:hover .prow-arr, .prov-row.sel .prow-arr { color:var(--accent); transform:translateX(2px); }
@media (max-width:640px) { .sidebar { display:none; } }
</style>
</head>
<body>
<div class="layout">
  <div class="header">
    <div class="dot"></div>
    <span class="title">省份数据地图</span>
    <span class="header-hint">CLICK PROVINCE → OPEN TABLE</span>
  </div>
  <div class="body">
    <div id="map"></div>
    <div class="sidebar">
      <div class="sel-block">
        <div class="sel-label">SELECTED</div>
        <div class="sel-name" id="sel-name">— 请选择 —</div>
        <div class="sel-region" id="sel-region">点击地图或列表中的省份</div>
      </div>
      <a class="jump-btn disabled" id="jump-btn" href="#" target="_blank">
        <span>↗</span> 打开多维表格
      </a>
      <div class="divider"></div>
      <div class="list-header">ALL PROVINCES</div>
      <div class="list-scroll" id="prov-list"></div>
    </div>
  </div>
</div>
<script>
var PROVINCES = [
  {id:'北京',  region:'华北', link:''},
  {id:'天津',  region:'华北', link:''},
  {id:'河北',  region:'华北', link:''},
  {id:'山西',  region:'华北', link:''},
  {id:'内蒙古',region:'华北', link:''},
  {id:'辽宁',  region:'东北', link:''},
  {id:'吉林',  region:'东北', link:''},
  {id:'黑龙江',region:'东北', link:''},
  {id:'上海',  region:'华东', link:'https://doc.weixin.qq.com/smartsheet/s3_ARgAzQYAAPACNtY5LN4epSkOWRu3j?scode=AFgA1wfcAB00gPENDiARgAzQYAAPA&tab=q979lj&viewId=vukaF8'},
  {id:'江苏',  region:'华东', link:''},
  {id:'浙江',  region:'华东', link:''},
  {id:'安徽',  region:'华东', link:''},
  {id:'福建',  region:'华东', link:''},
  {id:'江西',  region:'华东', link:''},
  {id:'山东',  region:'华东', link:''},
  {id:'河南',  region:'华中', link:''},
  {id:'湖北',  region:'华中', link:''},
  {id:'湖南',  region:'华中', link:''},
  {id:'广东',  region:'华南', link:''},
  {id:'广西',  region:'华南', link:''},
  {id:'海南',  region:'华南', link:''},
  {id:'重庆',  region:'西南', link:''},
  {id:'四川',  region:'西南', link:''},
  {id:'贵州',  region:'西南', link:''},
  {id:'云南',  region:'西南', link:''},
  {id:'西藏',  region:'西南', link:''},
  {id:'陕西',  region:'西北', link:''},
  {id:'甘肃',  region:'西北', link:''},
  {id:'青海',  region:'西北', link:''},
  {id:'宁夏',  region:'西北', link:''},
  {id:'新疆',  region:'西北', link:''},
  {id:'台湾',  region:'港澳台', link:''},
  {id:'香港',  region:'港澳台', link:''},
  {id:'澳门',  region:'港澳台', link:''}
];
var REGION_COLOR = {'华北':'#1a5a9a','东北':'#0d6a4a','华东':'#1a3a8a','华中':'#4a1a7a','华南':'#0a5a6a','西南':'#4a3a0a','西北':'#4a2a0a','港澳台':'#2a2a2a'};
var REGION_ACCENT = {'华北':'#4ab0ff','东北':'#00dd88','华东':'#3399ff','华中':'#bb55ff','华南':'#00dddd','西南':'#ffbb33','西北':'#ff7733','港澳台':'#888888'};
var PROV_MAP = {};
PROVINCES.forEach(function(p){ PROV_MAP[p.id] = p; });
var listEl = document.getElementById('prov-list');
var REGIONS = ['华北','东北','华东','华中','华南','西南','西北','港澳台'];
REGIONS.forEach(function(rg){
  var rgTitle = document.createElement('div');
  rgTitle.className = 'rg-title';
  rgTitle.textContent = rg;
  rgTitle.style.color = REGION_ACCENT[rg];
  listEl.appendChild(rgTitle);
  PROVINCES.filter(function(p){ return p.region===rg; }).forEach(function(p){
    var row = document.createElement('div');
    row.className = 'prov-row';
    row.id = 'row-' + p.id;
    row.innerHTML = '<div class="prow-pip" style="background:'+REGION_ACCENT[rg]+'"></div><span class="prow-name">'+p.id+'</span><span class="prow-arr">→</span>';
    row.addEventListener('click', function(){ selectProv(p.id); });
    listEl.appendChild(row);
  });
});
var chart = echarts.init(document.getElementById('map'), null, {renderer:'svg'});
fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
  .then(function(r){ return r.json(); })
  .then(function(geoJson){ echarts.registerMap('china', geoJson); renderMap(); });
function renderMap(){
  var mapData = PROVINCES.map(function(p){
    return { name:p.id, value:1, itemStyle:{ areaColor: REGION_COLOR[p.region]||'#1a3060' } };
  });
  chart.setOption({
    backgroundColor:'transparent',
    tooltip:{ show:true, formatter:function(params){ var p=PROV_MAP[params.name]; if(!p) return params.name; return '<span style="color:#00c8ff;font-weight:500">'+p.id+'</span><br/><span style="color:#4a7090;font-size:11px">'+p.region+'</span>'; }, backgroundColor:'rgba(8,16,32,0.95)', borderColor:'rgba(0,180,255,0.5)', borderWidth:1, textStyle:{color:'#c8dff0',fontSize:13} },
    series:[{ type:'map', map:'china', roam:true, zoom:1.18, center:[105,38], scaleLimit:{min:0.8,max:6}, data:mapData, nameProperty:'name', label:{ show:true, fontSize:9, color:'rgba(180,220,255,0.75)', fontFamily:'Noto Sans SC,PingFang SC,sans-serif' }, emphasis:{ label:{show:true,color:'#fff',fontSize:10}, itemStyle:{areaColor:'rgba(0,200,255,0.5)',borderColor:'#00c8ff',borderWidth:1.5} }, select:{ label:{show:true,color:'#fff',fontSize:10,fontWeight:600}, itemStyle:{areaColor:'rgba(0,200,255,0.6)',borderColor:'#00e0ff',borderWidth:2} }, selectedMode:'single', itemStyle:{borderColor:'rgba(0,160,220,0.45)',borderWidth:0.7} }]
  });
  chart.on('click', function(params){ if(params.componentType==='series') selectProv(params.name); });
}
window.addEventListener('resize', function(){ chart.resize(); });
var currentProv = null;
function selectProv(name){
  var p = PROV_MAP[name];
  if(!p) return;
  if(currentProv){ var oldRow=document.getElementById('row-'+currentProv); if(oldRow) oldRow.classList.remove('sel'); }
  currentProv = name;
  var row = document.getElementById('row-'+name);
  if(row){ row.classList.add('sel'); row.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  document.getElementById('sel-name').textContent = name;
  document.getElementById('sel-region').textContent = p.region;
  var btn = document.getElementById('jump-btn');
  if(p.link){ btn.href=p.link; btn.classList.remove('disabled'); btn.onclick=null; }
  else { btn.href='#'; btn.classList.add('disabled'); btn.onclick=function(e){ e.preventDefault(); alert('请为【'+name+'】配置多维表格链接'); }; }
  chart.dispatchAction({type:'select',seriesIndex:0,name:name});
}
</script>
</body>
</html>
